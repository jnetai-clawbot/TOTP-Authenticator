name: Build & Release TOTP Authenticator APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v2
      
      - name: Import keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/keystore.jks
          echo "Keystore imported"
      
      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug 2>&1
      
      - name: Build release APK
        env:
          KEYSTORE_PASSWORD: "${{ secrets.KEYSTORE_PASSWORD }}"
          KEY_PASSWORD: "${{ secrets.KEY_PASSWORD }}"
        run: |
          cd android
          ./gradlew assembleRelease 2>&1
      
      - name: Rename APKs
        run: |
          cp android/app/build/outputs/apk/debug/app-debug.apk totp-debug.apk
          cp android/app/build/outputs/apk/release/app-release.apk totp-release.apk
          ls -lh totp-*.apk
      
      - name: Upload debug APK (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: totp-debug
          path: totp-debug.apk
      
      - name: Upload release APK (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: totp-release
          path: totp-release.apk
      
      - name: Create GitHub Release
        id: create_release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="v${{ github.run_number }}"
          TAG="totp-$VERSION"
          
          # Check if release already exists
          EXISTING=$(gh release view "$TAG" --json tagName 2>/dev/null || echo "")
          
          if [ -n "$EXISTING" ]; then
            echo "Release $TAG already exists, uploading assets..."
            gh release upload "$TAG" totp-debug.apk totp-release.apk --clobber
          else
            echo "Creating release $TAG..."
            gh release create "$TAG" \
              --title "TOTP Authenticator $VERSION" \
              --notes "TOTP Authenticator $VERSION
          - Debug: \`totp-debug.apk\`
          - Release (signed): \`totp-release.apk\`
          
          **Target devices:** Samsung S7, S8, Pixel 6, Pixel 7 (minSdk 24)
          **Features:** Google Sign-In, QR scanning, encrypted storage, dark theme" \
              totp-debug.apk totp-release.apk
          fi
