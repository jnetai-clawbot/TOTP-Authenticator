name: Build & Release TOTP Authenticator APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v2
      
      - name: Import keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/keystore.jks
          echo "Keystore imported"
      
      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug 2>&1
      
      - name: Build release APK
        env:
          KEYSTORE_PASSWORD: "${{ secrets.KEYSTORE_PASSWORD }}"
          KEY_PASSWORD: "${{ secrets.KEY_PASSWORD }}"
        run: |
          cd android
          ./gradlew assembleRelease 2>&1
      
      - name: Rename APKs
        run: |
          cp android/app/build/outputs/apk/debug/app-debug.apk totp-debug.apk
          cp android/app/build/outputs/apk/release/app-release.apk totp-release.apk
          ls -lh totp-*.apk
      
      - name: Upload debug APK (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: totp-debug
          path: totp-debug.apk
      
      - name: Upload release APK (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: totp-release
          path: totp-release.apk
      
      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "TOTP Authenticator v${{ github.run_number }}"
          body: |
            ## TOTP Authenticator v${{ github.run_number }}
            
            - Debug: `totp-debug.apk`
            - Release (signed): `totp-release.apk`
            
            **Target devices:** Samsung S7, S8, Pixel 6, Pixel 7 (minSdk 24)
            **Features:** Google Sign-In, QR scanning, encrypted storage, dark theme
          files: |
            totp-debug.apk
            totp-release.apk
          generate_release_notes: false
