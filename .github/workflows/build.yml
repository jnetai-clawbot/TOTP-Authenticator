name: Build Android APK

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Android SDK
        uses: androidsdk/setup-android@v1
        with:
          sdk-components: 'platform-tools;platforms;build-tools'
      
      - name: Cache Gradle
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/*.gradle*', 'android/app/*.gradle*') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
      
      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > android/local.properties
      
      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon 2>&1 | tee build.log

      - name: Upload build log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: android/build.log
      
      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: authenticator-apk
          path: |
            android/app/build/outputs/apk/debug/*.apk
          retention-days: 30
